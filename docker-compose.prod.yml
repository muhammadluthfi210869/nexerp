version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-erp_password_secure}
      POSTGRES_DB: ${DB_NAME:-erp_database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - erp_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-erp_user}:${DB_PASSWORD:-erp_password_secure}@db:5432/${DB_NAME:-erp_database}?schema=public
      PORT: 3002
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-me}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db
    networks:
      - erp_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://5.223.80.88/api}
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://5.223.80.88/api}
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - erp_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - erp_network

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

networks:
  erp_network:
    driver: bridge

volumes:
  postgres_data:
